project:
  name: "topic-model-italian-facebook"
  random_seed: 42

paths:
  raw_parquet: "${RAW_PARQUET_PATH}"
  duckdb_path: "outputs/posts.duckdb"
  interim_partitioned_dir: "data/interim/raw_partitioned"
  sample_path: "data/interim/sample.parquet"
  processed_dir: "data/processed/posts_clean"
  model_path: "models/bertopic_model.pkl"
  outputs_dir: "outputs"
  reports_dir: "reports"

data_schema:
  text_col: "message"
  timestamp_col: "date"
  account_col: "account_platformId"
  post_id_col: "platformId"

preprocess:
  min_chars: 20
  keep_emojis_as_text: true
  normalize_hashtags: true
  replace_urls: true
  replace_mentions: true
  lowercase: true
  lemmatize_sample_only: true
  spacy_batch_size: 512

sampling:
  # total sample size = per_month * number_of_months_present
  per_month: 1500
  seed: 42

embedding:
  model_name: "sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2"
  device: "auto"           # "auto" | "cpu" | "cuda"
  batch_size: 64
  normalize_embeddings: true
  max_seq_length: 256

bertopic:
  calculate_probabilities: false
  low_memory: true

  vectorizer:
    ngram_range: [1, 2]
    min_df: 10
    max_df: 0.5
    max_features: 50000

  umap:
    n_neighbors: 30
    n_components: 5
    min_dist: 0.0
    metric: "cosine"
    random_state: 42

  hdbscan:
    min_cluster_size: 100
    min_samples: 10
    metric: "euclidean"
    cluster_selection_method: "eom"
    prediction_data: true

streaming:
  parquet_batch_size: 50000
